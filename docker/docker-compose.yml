# AI CareerVerse — Production Docker Compose
# Phase 7: Docker + Nginx + Gunicorn + Redis + Celery
version: "3.9"

services:
  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DB:-aicareerverse}
      MYSQL_USER: ${MYSQL_USER:-aicareer}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-securepass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask App (Gunicorn + eventlet) ────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      MYSQL_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - uploads:/app/uploads
    expose:
      - "5000"
    command: >
      gunicorn -w 4 -k eventlet -b 0.0.0.0:5000
      --timeout 120 --keep-alive 5 --log-level info
      "run:app"

  # ── Celery Worker (AI tasks) ────────────────────────────────────────────────
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      MYSQL_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A app.tasks.celery_app worker -Q ai,notifications -l info --concurrency 4

  # ── Celery Beat (scheduled tasks) ──────────────────────────────────────────
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      MYSQL_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    command: celery -A app.tasks.celery_app beat -l info

  # ── Flower (Celery monitoring) ──────────────────────────────────────────────
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    ports:
      - "5555:5555"
    command: celery -A app.tasks.celery_app flower --port=5555

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../app/static:/static:ro
      - uploads:/uploads:ro
      - ssl_certs:/etc/nginx/ssl:ro

volumes:
  mysql_data:
  redis_data:
  uploads:
  ssl_certs:
