{% extends "layout_dash.html" %}
{% block title %}Alumni Profile{% endblock %}
{% block content %}
<div style="padding:1.5rem;max-width:40rem;margin:0 auto">
  <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.5rem;color:#fff;margin-bottom:1.5rem">👤 Alumni Profile</h1>
  <div class="card" style="padding:1.5rem">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #172040">
      <div style="width:4rem;height:4rem;border-radius:1rem;background:linear-gradient(135deg,#7c3aed,#3355ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.5rem">
        {{ session.get('name','U')[0].upper() }}
      </div>
      <div>
        <p style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;font-size:1.125rem">{{ session.get('name','') }}</p>
        <p style="font-size:.875rem;color:#64748b">Alumni Mentor</p>
      </div>
    </div>
    <form method="POST" action="/alumni/profile">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
        <div>
          <label style="display:block;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem">Company</label>
          <input type="text" name="company" class="input" placeholder="Google" value="{{ profile.get('company','') }}"/>
        </div>
        <div>
          <label style="display:block;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem">Job Role</label>
          <input type="text" name="job_role" class="input" placeholder="Software Engineer" value="{{ profile.get('job_role','') }}"/>
        </div>
      </div>
      <div style="margin-bottom:1rem">
        <label style="display:block;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem">Skills</label>
        <textarea name="skills" class="input" style="height:5rem;resize:none" placeholder="Python, React, System Design...">{{ profile.get('skills','') }}</textarea>
      </div>
      <div style="margin-bottom:1rem">
        <label style="display:block;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem">Location</label>
        <input type="text" name="location" class="input" placeholder="San Francisco, CA" value="{{ profile.get('location','') }}"/>
      </div>
      <div style="margin-bottom:1rem">
        <label style="display:block;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem">LinkedIn URL</label>
        <input type="url" name="linkedin" class="input" placeholder="https://linkedin.com/in/..." value="{{ profile.get('linkedin','') }}"/>
      </div>
      <div style="margin-bottom:1rem">
        <label style="display:block;font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.375rem">Bio</label>
        <textarea name="bio" class="input" style="height:7rem;resize:none" placeholder="Share your journey and what you can offer as a mentor..." maxlength="1000">{{ profile.get('bio','') }}</textarea>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;padding:1rem;border-radius:.875rem;background:#111d35;border:1px solid #1e2850;margin-bottom:1.5rem">
        <input type="checkbox" name="is_hiring" id="is_hiring" {% if profile.get('is_hiring') %}checked{% endif %} style="width:1rem;height:1rem;accent-color:#3355ff"/>
        <label for="is_hiring" style="font-size:.875rem;color:#cbd5e1;cursor:pointer">My company is currently hiring — let students know!</label>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:.875rem">💾 Save Profile</button>
    </form>
  </div>
</div>
{% endblock %}
