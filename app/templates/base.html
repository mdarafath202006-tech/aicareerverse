<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AI CareerVerse{% endblock %}</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- Tailwind CDN (dev only — in prod use compiled CSS from React build) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 300:'#90aeff', 400:'#5a7fff', 500:'#3355ff', 600:'#1c35e8' },
            dark:  { 500:'#172040', 600:'#111d35', 700:'#0d1526', 800:'#080c14', 900:'#030407' },
          },
          fontFamily: { display:['Space Grotesk','sans-serif'], body:['DM Sans','sans-serif'] },
        }
      }
    }
  </script>
  <style>
    body { font-family:'DM Sans',sans-serif; }
    h1,h2,h3,h4,h5,h6 { font-family:'Space Grotesk',sans-serif; }
    .card { background:#0d1526; border:1px solid #172040; border-radius:1rem; }
    .btn-primary { background:#3355ff; color:#fff; padding:.625rem 1.25rem; border-radius:.75rem; font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:.875rem; display:inline-flex; align-items:center; gap:.5rem; transition:all .2s; cursor:pointer; border:none; }
    .btn-primary:hover { background:#1c35e8; transform:translateY(-1px); }
    .btn-secondary { background:#172040; color:#cbd5e1; border:1px solid #1e2850; padding:.625rem 1.25rem; border-radius:.75rem; font-family:'Space Grotesk',sans-serif; font-size:.875rem; display:inline-flex; align-items:center; gap:.5rem; transition:all .2s; cursor:pointer; text-decoration:none; }
    .btn-secondary:hover { background:#1e2850; color:#fff; }
    .input { width:100%; background:#111d35; border:1px solid #1e2850; border-radius:.75rem; padding:.75rem 1rem; color:#f1f5f9; font-size:.875rem; transition:all .2s; outline:none; font-family:'DM Sans',sans-serif; }
    .input:focus { border-color:#3355ff; box-shadow:0 0 0 3px rgba(51,85,255,.15); }
    .badge { display:inline-flex; align-items:center; padding:.2rem .65rem; border-radius:9999px; font-size:.7rem; font-weight:500; }
    .badge-brand { background:rgba(51,85,255,.12); color:#90aeff; border:1px solid rgba(51,85,255,.2); }
    .badge-green { background:rgba(16,185,129,.12); color:#6ee7b7; border:1px solid rgba(16,185,129,.2); }
    .badge-amber { background:rgba(245,158,11,.12); color:#fcd34d; border:1px solid rgba(245,158,11,.2); }
    .badge-rose  { background:rgba(244,63,94,.12);  color:#fda4af; border:1px solid rgba(244,63,94,.2); }
    .progress-bar { height:.5rem; border-radius:9999px; background:#172040; overflow:hidden; }
    .progress-fill { height:100%; border-radius:9999px; background:linear-gradient(90deg,#3355ff,#06d6d6); transition:width .7s ease; }
    .sidebar-link { display:flex; align-items:center; gap:.75rem; padding:.625rem 1rem; border-radius:.75rem; font-size:.875rem; color:#94a3b8; font-family:'Space Grotesk',sans-serif; text-decoration:none; transition:all .15s; }
    .sidebar-link:hover { background:rgba(255,255,255,.05); color:#fff; }
    .sidebar-link.active { background:rgba(51,85,255,.1); color:#90aeff; border:1px solid rgba(51,85,255,.2); }
    ::-webkit-scrollbar { width:.375rem; }
    ::-webkit-scrollbar-track { background:#080c14; }
    ::-webkit-scrollbar-thumb { background:#172040; border-radius:9999px; }
    .toast { position:fixed; top:1rem; right:1rem; z-index:9999; }
    .toast-item { padding:.875rem 1.25rem; border-radius:.75rem; border:1px solid rgba(51,85,255,.2); background:#111d35; color:#e2e8f0; font-family:'DM Sans',sans-serif; font-size:.875rem; margin-bottom:.5rem; box-shadow:0 4px 24px rgba(0,0,0,.4); animation:slideIn .3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateX(2rem)} to{opacity:1;transform:translateX(0)} }
    .flash-success { border-color:rgba(16,185,129,.3); background:rgba(16,185,129,.08); }
    .flash-danger  { border-color:rgba(244,63,94,.3);  background:rgba(244,63,94,.08); }
    .flash-warning { border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.08); }
    .flash-info    { border-color:rgba(6,214,214,.3);  background:rgba(6,214,214,.08); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-dark-900 text-slate-100 min-h-screen">

<!-- Flash messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="toast" id="toast-container">
    {% for category, message in messages %}
    <div class="toast-item flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  </div>
  <script>setTimeout(()=>{const c=document.getElementById('toast-container');if(c)c.remove();}, 5000);</script>
  {% endif %}
{% endwith %}

{% block body %}{% endblock %}

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const socket = io();
  socket.on('connect', () => {
    socket.emit('notification_subscribe');
  });
  socket.on('live_notification', (n) => {
    const c = document.getElementById('toast-container') || (() => {
      const d = document.createElement('div');
      d.className='toast'; d.id='toast-container';
      document.body.appendChild(d); return d;
    })();
    const t = document.createElement('div');
    t.className='toast-item'; t.textContent = (n.title || '') + ': ' + (n.message || '');
    c.appendChild(t);
    setTimeout(()=>t.remove(), 5000);
  });
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
