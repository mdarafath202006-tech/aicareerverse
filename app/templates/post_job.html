{% extends "layout_dash.html" %}
{% block title %}Post a Job — AI CareerVerse{% endblock %}
{% block page_title %}Post a Job{% endblock %}
{% block content %}
<div style="padding:1.75rem;max-width:52rem;margin:0 auto">
  <div style="margin-bottom:2rem">
    <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:#f1f5f9;margin-bottom:.3rem">
      Post a Job / Internship
    </h1>
    <p style="color:var(--text-lo);font-size:.875rem">Share an opportunity with the student community</p>
  </div>
  <div class="card" style="padding:2rem">
    <form method="POST" action="/jobs/post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div>
          <label class="field-label">Job Title *</label>
          <input class="input" name="title" placeholder="Software Engineer Intern" required/>
        </div>
        <div>
          <label class="field-label">Company *</label>
          <input class="input" name="company" placeholder="Google" required/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div>
          <label class="field-label">Location</label>
          <input class="input" name="location" placeholder="Bangalore / Remote"/>
        </div>
        <div>
          <label class="field-label">Job Type</label>
          <select class="input" name="job_type">
            <option value="full_time">Full Time</option>
            <option value="internship">Internship</option>
            <option value="part_time">Part Time</option>
            <option value="contract">Contract</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:1rem">
        <label class="field-label">Description</label>
        <textarea class="input" name="description" rows="4" placeholder="Describe the role, responsibilities, and what you're looking for..."></textarea>
      </div>
      <div style="margin-bottom:1rem">
        <label class="field-label">Requirements</label>
        <textarea class="input" name="requirements" rows="3" placeholder="Required qualifications, experience level..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div>
          <label class="field-label">Skills Required</label>
          <input class="input" name="skills_required" placeholder="Python, React, SQL"/>
        </div>
        <div>
          <label class="field-label">Salary / Stipend</label>
          <input class="input" name="salary_range" placeholder="₹8-12 LPA / ₹25k/month"/>
        </div>
      </div>
      <div style="margin-bottom:1.5rem">
        <label class="field-label">External Apply URL (optional)</label>
        <input class="input" name="apply_url" placeholder="https://careers.company.com/..."/>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:.875rem">
        <a href="/jobs" class="btn btn-ghost" style="text-decoration:none">Cancel</a>
        <button type="submit" class="btn btn-primary">Post Job 🚀</button>
      </div>
    </form>
  </div>
</div>
<style>
.field-label { display:block;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--text-lo);margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.08em; }
textarea.input { resize:vertical;min-height:5rem; }
</style>
{% endblock %}
