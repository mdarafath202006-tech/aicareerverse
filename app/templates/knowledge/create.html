{% extends "layout_dash.html" %}
{% block title %}Share Your Story — AI CareerVerse{% endblock %}
{% block content %}
<div style="padding:1.5rem;max-width:700px;margin:0 auto">
  <a href="/knowledge/" style="display:inline-flex;align-items:center;gap:.5rem;color:var(--text-mid);text-decoration:none;font-size:.85rem;margin-bottom:1.5rem">← Knowledge Base</a>
  <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:1rem;padding:1.5rem">
    <h1 style="font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:#f1f5f9;margin-bottom:.25rem">Share Your Experience</h1>
    <p style="color:var(--text-mid);font-size:.85rem;margin-bottom:1.5rem">Help the next generation with your story. What you learned could be what someone else needs.</p>
    <form method="POST" style="display:flex;flex-direction:column;gap:1.25rem">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div>
        <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Category *</label>
        <select name="category" required style="width:100%;padding:.75rem 1rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;outline:none">
          <option value="success_story">🌟 Success Story</option>
          <option value="interview_experience">💬 Interview Experience</option>
          <option value="placement_story">🎓 Placement Story</option>
          <option value="career_guide">🗺️ Career Guide</option>
          <option value="company_review">🏢 Company Review</option>
          <option value="tips_and_tricks">💡 Tips & Tricks</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Title *</label>
        <input type="text" name="title" required maxlength="300"
          style="width:100%;padding:.75rem 1rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;outline:none"
          placeholder="e.g. My Google internship experience — what I wish I knew"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.875rem">
        <div>
          <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Company</label>
          <input type="text" name="company" maxlength="150"
            style="width:100%;padding:.75rem 1rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;outline:none"
            placeholder="Google, Amazon, etc."/>
        </div>
        <div>
          <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Role</label>
          <input type="text" name="role" maxlength="150"
            style="width:100%;padding:.75rem 1rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;outline:none"
            placeholder="Software Engineer Intern"/>
        </div>
      </div>
      <div>
        <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Your Story *</label>
        <textarea name="content" rows="10" required
          style="width:100%;padding:.75rem 1rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;outline:none;resize:vertical;line-height:1.6"
          placeholder="Share your full story here. Be specific — timeline, preparation, challenges, what worked, what didn't..."></textarea>
      </div>
      <div>
        <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">Tags</label>
        <input type="text" name="tags" maxlength="500"
          style="width:100%;padding:.75rem 1rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:.75rem;color:#f1f5f9;font-size:.9rem;outline:none"
          placeholder="python, leetcode, system design, product management"/>
      </div>
      <button type="submit" style="background:linear-gradient(135deg,#1a52ff,#8b5cf6);color:#fff;padding:.875rem;border-radius:.875rem;font-weight:700;font-size:.9rem;cursor:pointer;border:none">
        Publish Story 🚀
      </button>
    </form>
  </div>
</div>
{% endblock %}
