{% extends "base.html" %}
{% block title %}Sign In — AI CareerVerse{% endblock %}
{% block body %}
<div style="min-height:100vh;background:#030407;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(51,85,255,.2) 0%,transparent 60%)"></div>
  <div style="position:relative;width:100%;max-width:26rem">
    <div style="text-align:center;margin-bottom:2rem">
      <a href="/" style="display:inline-flex;align-items:center;gap:.75rem;text-decoration:none">
        <div style="width:3rem;height:3rem;border-radius:1rem;background:linear-gradient(135deg,#3355ff,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(51,85,255,.4)">🤖</div>
      </a>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.5rem;color:#fff;margin-top:1rem">Welcome back</h1>
      <p style="color:#64748b;font-size:.875rem;margin-top:.25rem">Sign in to your account</p>
    </div>
    <div class="card" style="padding:2rem">
      <!-- OAuth -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem">
        <a href="/auth/google"   class="btn-secondary" style="text-decoration:none;justify-content:center;padding:.625rem">🔵 Google</a>
        <a href="/auth/linkedin" class="btn-secondary" style="text-decoration:none;justify-content:center;padding:.625rem">🔷 LinkedIn</a>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem">
        <div style="flex:1;height:1px;background:#172040"></div>
        <span style="font-size:.75rem;color:#334155">or continue with email</span>
        <div style="flex:1;height:1px;background:#172040"></div>
      </div>
      <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}"/>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.75rem;font-weight:500;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Email</label>
          <input class="input" type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div style="margin-bottom:1.25rem">
          <label style="display:block;font-size:.75rem;font-weight:500;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Password</label>
          <input class="input" type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:.875rem;font-size:1rem">Sign In</button>
      </form>
      <p style="text-align:center;font-size:.875rem;color:#64748b;margin-top:1.5rem">
        Don't have an account? <a href="/register" style="color:#90aeff;text-decoration:none;font-weight:500">Sign up free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
