{% extends "base.html" %}
{% block title %}Create Account — AI CareerVerse{% endblock %}
{% block body %}
<div style="min-height:100vh;background:#030407;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(51,85,255,.2) 0%,transparent 60%)"></div>
  <div style="position:relative;width:100%;max-width:28rem">
    <div style="text-align:center;margin-bottom:2rem">
      <a href="/" style="display:inline-flex;align-items:center;gap:.75rem;text-decoration:none">
        <div style="width:2.5rem;height:2.5rem;border-radius:.875rem;background:linear-gradient(135deg,#3355ff,#7c3aed);display:flex;align-items:center;justify-content:center">🤖</div>
        <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff">AI CareerVerse</span>
      </a>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.5rem;color:#fff;margin-top:1rem">Create your account</h1>
    </div>
    <div class="card" style="padding:2rem">
      <!-- Role toggle -->
      <div id="role-toggle" style="display:grid;grid-template-columns:1fr 1fr;gap:.25rem;background:#111d35;border-radius:.875rem;padding:.25rem;margin-bottom:1.5rem">
        <button type="button" onclick="setRole('student')" id="btn-student" style="padding:.625rem;border-radius:.75rem;border:none;background:#3355ff;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:.875rem;cursor:pointer;transition:all .2s">🎓 Student</button>
        <button type="button" onclick="setRole('alumni')"  id="btn-alumni"  style="padding:.625rem;border-radius:.75rem;border:none;background:none;color:#64748b;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:.875rem;cursor:pointer;transition:all .2s">💼 Alumni</button>
      </div>
      <form method="POST" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}"/>
        <input type="hidden" name="role" id="role-input" value="student"/>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Full Name</label>
          <input class="input" type="text" name="name" placeholder="Alex Johnson" required/>
        </div>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Email</label>
          <input class="input" type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Password</label>
          <input class="input" type="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required/>
        </div>
        <!-- Student fields -->
        <div id="student-fields">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
            <div>
              <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Department</label>
              <input class="input" type="text" name="department" placeholder="CSE"/>
            </div>
            <div>
              <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Year</label>
              <select class="input" name="year" style="cursor:pointer">
                <option value="">Select</option>
                <option>1st</option><option>2nd</option><option>3rd</option><option>4th</option><option>5th</option>
              </select>
            </div>
          </div>
        </div>
        <!-- Alumni fields -->
        <div id="alumni-fields" style="display:none">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
            <div>
              <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Grad Year</label>
              <input class="input" type="number" name="grad_year" placeholder="2022" min="2000" max="2030"/>
            </div>
            <div>
              <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Company</label>
              <input class="input" type="text" name="company" placeholder="Google"/>
            </div>
          </div>
          <div style="margin-bottom:1rem">
            <label style="display:block;font-size:.75rem;color:#64748b;margin-bottom:.375rem;text-transform:uppercase;letter-spacing:.05em">Job Role</label>
            <input class="input" type="text" name="job_role" placeholder="Software Engineer"/>
          </div>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:.875rem;font-size:1rem;margin-top:.5rem">Create Account</button>
      </form>
      <p style="text-align:center;font-size:.875rem;color:#64748b;margin-top:1.5rem">
        Already have an account? <a href="/login" style="color:#90aeff;text-decoration:none;font-weight:500">Sign in</a>
      </p>
    </div>
  </div>
</div>
<script>
function setRole(r){
  document.getElementById('role-input').value=r;
  const bs=document.getElementById('btn-student'), ba=document.getElementById('btn-alumni');
  const sf=document.getElementById('student-fields'), af=document.getElementById('alumni-fields');
  if(r==='student'){
    bs.style.background='#3355ff'; bs.style.color='#fff';
    ba.style.background='none'; ba.style.color='#64748b';
    sf.style.display='block'; af.style.display='none';
  } else {
    ba.style.background='#3355ff'; ba.style.color='#fff';
    bs.style.background='none'; bs.style.color='#64748b';
    af.style.display='block'; sf.style.display='none';
  }
}
const p=new URLSearchParams(location.search);
if(p.get('role')==='alumni') setRole('alumni');
</script>
{% endblock %}
