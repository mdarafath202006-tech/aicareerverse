# AI CareerVerse V3 — GitHub Actions CI Pipeline
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: aicareerverse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DB migrations (test)
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/aicareerverse_test
          SECRET_KEY: test-secret-key-ci
          FLASK_ENV: testing
          WTF_CSRF_ENABLED: "False"
        run: |
          flask db upgrade

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/aicareerverse_test
          SECRET_KEY: test-secret-key-ci
          FLASK_ENV: testing
          WTF_CSRF_ENABLED: "False"
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker_build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aicareerverse:ci .

      - name: Verify image builds successfully
        run: docker images aicareerverse:ci

  deploy_render:
    name: Deploy to Render (main branch only)
    runs-on: ubuntu-latest
    needs: [test, docker_build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK not set — skipping deploy."
          fi
