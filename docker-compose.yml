# AI CareerVerse V3 — Docker Compose (dev + production)
version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://careerverse:careerverse@db:5432/aicareerverse
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: >
      sh -c "flask db upgrade &&
             python migrations/seed_data.py &&
             gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000
             --reload --timeout 120 run:app"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: careerverse
      POSTGRES_PASSWORD: careerverse
      POSTGRES_DB: aicareerverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerverse -d aicareerverse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://careerverse:careerverse@db:5432/aicareerverse
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app

  flower:
    build: .
    env_file: .env
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker
    command: celery -A app.tasks.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
